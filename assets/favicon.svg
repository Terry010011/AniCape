<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="icon-preview">
    <defs>
        <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027"></stop>
            <stop offset="50%" stop-color="#203a43"></stop>
            <stop offset="100%" stop-color="#2c5364"></stop>
        </linearGradient>
        <!-- 像素筆刷發光效果 -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
            <feComposite in="SourceGraphic" in2="blur" operator="over"></feComposite>
        </filter>
    </defs>
    <rect width="512" height="512" rx="115" fill="url(#bg2)"></rect>
    
    <!-- 像素化披風輪廓 (深色底板) -->
    <rect x="144" y="96" width="224" height="320" fill="#000000" opacity="0.3"></rect>
    
    <!-- 置中後的像素播放按鈕 -->
    <!-- Y軸上移至 144 開始 (高224，完美對齊中心點256) -->
    <!-- X軸微調至 208 開始，修正三角形的「視覺重心」，看起來更平衡 -->
    <g fill="#E63946" filter="url(#glow)"> <!-- 經典紅 -->
        <!-- 第一排 (頂) -->
        <rect x="208" y="144" width="32" height="32"></rect>
        
        <!-- 第二排 -->
        <rect x="208" y="176" width="32" height="32"></rect>
        <rect x="240" y="176" width="32" height="32"></rect>
        
        <!-- 第三排 -->
        <rect x="208" y="208" width="32" height="32"></rect>
        <rect x="240" y="208" width="32" height="32"></rect>
        <rect x="272" y="208" width="32" height="32"></rect>
        
        <!-- 第四排 (中心) -->
        <rect x="208" y="240" width="32" height="32"></rect>
        <rect x="240" y="240" width="32" height="32"></rect>
        <rect x="272" y="240" width="32" height="32"></rect>
        <rect x="304" y="240" width="32" height="32"></rect>
        
        <!-- 第五排 -->
        <rect x="208" y="272" width="32" height="32"></rect>
        <rect x="240" y="272" width="32" height="32"></rect>
        <rect x="272" y="272" width="32" height="32"></rect>
        
        <!-- 第六排 -->
        <rect x="208" y="304" width="32" height="32"></rect>
        <rect x="240" y="304" width="32" height="32"></rect>
        
        <!-- 第七排 (底) -->
        <rect x="208" y="336" width="32" height="32"></rect>
    </g>

    <!-- 飄散的像素點 (根據置中後的主體同步調整位置) -->
    <rect x="352" y="144" width="32" height="32" fill="#F4A261"></rect>
    <rect x="384" y="240" width="32" height="32" fill="#2A9D8F"></rect>
    <rect x="320" y="336" width="32" height="32" fill="#E9C46A"></rect>
</svg>